<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
       <link rel="stylesheet" href="https://pyscript.net/releases/2025.8.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2025.8.1/core.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
        <title>SW2</title>

    <style>
        body {
            background-color: rgb(248, 187, 255);
            color: rgb(0, 0, 0);
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            max-height: 1000px;
            background: white;
            padding: 26px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            color:rgb(248, 187, 255);
            font-family: 'Courier New', Courier, monospace;
        }
        
    </style>
    </head>

<body>

    <div class="container text-center mt-5">
    <h1>Grade 10 Classmates System</h1>
    <p style="color: gainsboro;">Add and view your classmates easily</p>
    <div class="mb-3">
        <label for="name" class="form-label">Name:</label>
        <input type="text" id="name" class="form-control">
    </div>
    <div class="mb-3">
        <label for="section" class="form-label">Section:</label>
        <input type="text" id="section" class="form-control">
    </div>
    <div class="mb-3">
        <label for="favorite_subject" class="form-label">Favorite Subject:</label>
        <input type="text" id="favorite_subject" class="form-control">
    </div>
    <button class="btn btn-primary" py-click="add_classmate">Add Person</button>
    <button class="btn btn-success" py-click="display_classmates">View Classmates</button>
    <br><br>
    <div id="classmates_output" style="color:rgb(228, 148, 255); font-size: medium;"></div>
    <py-script src="main.py"></py-script>
    </div>
</body>
</html>
